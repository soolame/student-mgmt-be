version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: student-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # ✅ Healthcheck to know when DB is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: student-app

    # ✅ Wait for postgres to be healthy
    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    ports:
      - "8080:8080"

    # Optional: run migrations automatically
    command: ["sh", "-c", "./migrate up  && ./app"]

volumes:
  postgres_data: